<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>屁屁点餐 — 餐厅温湿度监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#fff3e0,#ffe0b2);
  min-height:100vh;padding:16px;color:#333;
}
.container{max-width:480px;margin:0 auto}
h1{text-align:center;font-size:22px;margin-bottom:6px;color:#e8734a}
.subtitle{text-align:center;font-size:13px;color:#999;margin-bottom:20px}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.card{
  background:#fff;border-radius:16px;padding:20px;text-align:center;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.card .value{font-size:48px;font-weight:700;color:#e8734a}
.card .unit{font-size:16px;color:#e8734a;font-weight:400}
.card .label{font-size:13px;color:#999;margin-top:4px}
.card.warn .value{color:#e53935}
.card.warn{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 2px 12px rgba(0,0,0,.08)}50%{box-shadow:0 0 24px rgba(229,57,53,.3)}}

.led-panel{
  background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.led-panel h3{font-size:16px;margin-bottom:12px;color:#555}
.led-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.led-indicator{
  width:16px;height:16px;border-radius:50%;background:#ccc;
  transition:background .3s,box-shadow .3s;
}
.led-indicator.on{background:#ff9800;box-shadow:0 0 12px rgba(255,152,0,.6)}
.switch-btn{
  flex:1;padding:10px;border:none;border-radius:10px;font-size:16px;font-weight:600;
  cursor:pointer;transition:all .2s;color:#fff;
}
.switch-btn.on{background:#ff9800}
.switch-btn.off{background:#bdbdbd}

.slider-row{display:flex;align-items:center;gap:10px}
.slider-row label{font-size:13px;color:#888;white-space:nowrap}
.slider-row input[type=range]{flex:1;accent-color:#e8734a}
.slider-row .bval{width:40px;text-align:center;font-weight:600;color:#e8734a}
.send-btn{
  margin-top:12px;width:100%;padding:12px;border:none;border-radius:10px;
  background:#e8734a;color:#fff;font-size:16px;font-weight:600;cursor:pointer;
}
.send-btn:active{opacity:.8}

.chart-panel{
  background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.chart-panel h3{font-size:16px;margin-bottom:8px;color:#555}
.chart-wrap{position:relative;height:220px}
.chart-wrap canvas{width:100%!important}

.status{
  text-align:center;font-size:12px;padding:8px;border-radius:8px;margin-bottom:12px;
}
.status.online{background:#e8f5e9;color:#2e7d32}
.status.offline{background:#ffebee;color:#c62828}

.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:#e53935;color:#fff;padding:12px 24px;border-radius:12px;
  font-size:14px;font-weight:600;z-index:999;
  box-shadow:0 4px 20px rgba(229,57,53,.4);
  animation:slideDown .3s ease-out;
  display:none;
}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-60px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>

<div class="container">
  <h1>🌡️ 餐厅环境监控</h1>
  <p class="subtitle">屁屁点餐 · 智能温湿度</p>

  <div class="status offline" id="status">JSONP加载中...</div>

  <div class="cards">
    <div class="card" id="tempCard">
      <div class="value"><span id="tempVal">--</span><span class="unit">°C</span></div>
      <div class="label">当前温度</div>
    </div>
    <div class="card" id="humCard">
      <div class="value"><span id="humVal">--</span><span class="unit">%</span></div>
      <div class="label">当前湿度</div>
    </div>
  </div>

  <div class="led-panel">
    <h3>💡 灯光控制</h3>
    <div class="led-row">
      <div class="led-indicator off" id="ledDot"></div>
      <button class="switch-btn off" id="ledBtn" onclick="toggleLedManual()">OFF</button>
    </div>
    <div class="slider-row">
      <label>亮度</label>
      <input type="range" min="0" max="100" value="0" id="brightness">
      <span class="bval" id="bval">0%</span>
    </div>
    <button class="send-btn" onclick="sendLedCmd()">确认发送</button>
    <p style="font-size:11px;color:#999;margin-top:6px;">LED控制通过MQTT下发 (需ESP32在线)</p>
  </div>

  <div class="chart-panel">
    <h3>📈 实时温湿度趋势</h3>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 配置 ==========
const PRODUCT_ID  = 'iPiq3XW929';
const DEVICE_NAME = 'dining_hall_01';
const DEVICE_KEY  = 'SmFsZmhGVWx6RWtGV3B6NEZQNEY1YklVUGd3YTdFMHM=';
const ACCESS_KEY  = '33228735d1cf43d788c6f66f2508ca31';
const MQTT_TOKEN  = 'version=2018-10-31&res=products%2FiPiq3XW929%2Fdevices%2Fdining_hall_01&et=2000000000&method=md5&sign=iaAtsxMFKCrebb%2F0iG5RLw%3D%3D';

const TEMP_ALERT_HIGH = 30;
const HUM_ALERT_HIGH  = 80;
const POLL_INTERVAL   = 5000;  // 5秒轮询

// ========== JSONP 方式查询最新设备属性 (绕过CORS) ==========
let lastTemp = null, lastHum = null, lastLedState = 0, lastLedBright = 0;

function pollData() {
  // 时间戳防缓存
  const ts = Date.now();
  // 查询设备最新属性
  const url = `https://iot-api.heclouds.com/thing/property/${PRODUCT_ID}/${DEVICE_NAME}?t=${ts}`;

  // 动态创建 script 标签 (JSONP)
  const script = document.createElement('script');
  // 用 fetch 试试，如果 CORS 不行就用 JSONP 代理
  fetch(url, { headers: { 'access-key': ACCESS_KEY } })
    .then(r => r.json())
    .then(data => {
      document.getElementById('status').textContent = '在线';
      document.getElementById('status').className = 'status online';
      if (data.data) {
        updateFromApi(data.data);
      }
    })
    .catch(e => {
      console.log('直接请求失败, 尝试JSONP...', e.message);
      // 用 JSONP 代理方式
      jsonpPoll(ts);
    });

  setTimeout(pollData, POLL_INTERVAL);
}

// JSONP 备选方案
function jsonpPoll(ts) {
  const cbName = 'odcb_' + ts;
  window[cbName] = function(data) {
    if (data && data.data) {
      document.getElementById('status').textContent = '在线';
      document.getElementById('status').className = 'status online';
      updateFromApi(data.data);
    }
    delete window[cbName];
    document.getElementById('jsonp_'+ts)?.remove();
  };
  const url = `https://iot-api.heclouds.com/thing/property/${PRODUCT_ID}/${DEVICE_NAME}?t=${ts}`;
  // 无法做 JSONP (API 不支持), 仅标记离线
  setTimeout(() => {
    if (window[cbName]) {
      document.getElementById('status').textContent = '离线 (CORS限制)';
      document.getElementById('status').className = 'status offline';
      delete window[cbName];
    }
  }, 3000);
}

// ========== 解析 API 返回数据 ==========
function updateFromApi(data) {
  // data 格式: { "temperature": {"value": 25.3, "time": "..."}, "humidity": {...}, ... }
  const t = data.temperature;
  const h = data.humidity;
  const ls = data.led_switch;
  const lb = data.led_bright;

  if (t && t.value !== undefined) {
    const temp = parseFloat(t.value);
    if (!isNaN(temp)) {
      document.getElementById('tempVal').textContent = temp.toFixed(1);
      const card = document.getElementById('tempCard');
      if (temp > TEMP_ALERT_HIGH) {
        card.classList.add('warn');
        showToast(`⚠️ 温度过高: ${temp.toFixed(1)}°C`);
      } else {
        card.classList.remove('warn');
      }
      lastTemp = temp;
    }
  }

  if (h && h.value !== undefined) {
    const hum = parseFloat(h.value);
    if (!isNaN(hum)) {
      document.getElementById('humVal').textContent = Math.round(hum);
      const card = document.getElementById('humCard');
      if (hum > HUM_ALERT_HIGH) {
        card.classList.add('warn');
        showToast(`⚠️ 湿度过高: ${Math.round(hum)}%`);
      } else {
        card.classList.remove('warn');
      }
      lastHum = hum;
    }
  }

  if (ls && ls.value !== undefined) {
    lastLedState = ls.value;
    lastLedBright = lb ? lb.value : 0;
    updateLedUI(lastLedState === 1, lastLedBright);
  }

  // 追加图表数据
  if (lastTemp !== null && lastHum !== null && !isNaN(lastTemp) && !isNaN(lastHum)) {
    const now = new Date();
    const label = now.getHours().toString().padStart(2,'0') + ':' +
                  now.getMinutes().toString().padStart(2,'0');
    // 避免重复追加同一时间点
    if (tempData.labels.length === 0 || tempData.labels[tempData.labels.length-1] !== label) {
      tempData.labels.push(label);
      tempData.datasets[0].data.push(lastTemp);
      tempData.datasets[1].data.push(lastHum);
      if (tempData.labels.length > 50) {
        tempData.labels.shift();
        tempData.datasets[0].data.shift();
        tempData.datasets[1].data.shift();
      }
      chart.update();
    }
  }
}

// ========== LED UI ==========
function updateLedUI(state, brightness) {
  const dot = document.getElementById('ledDot');
  const btn = document.getElementById('ledBtn');
  const slider = document.getElementById('brightness');
  const bval = document.getElementById('bval');

  if (state) {
    dot.className = 'led-indicator on';
    btn.textContent = 'ON';
    btn.className = 'switch-btn on';
  } else {
    dot.className = 'led-indicator off';
    btn.textContent = 'OFF';
    btn.className = 'switch-btn off';
  }
  slider.value = brightness;
  bval.textContent = brightness + '%';
}

function toggleLedManual() {
  const btn = document.getElementById('ledBtn');
  const newState = btn.textContent === 'OFF';
  const slider = document.getElementById('brightness');
  updateLedUI(newState, parseInt(slider.value));
}

// ========== LED 控制 (通过 MQTT WebSocket) ==========
let mqttClient = null;
function sendLedCmd() {
  const btn = document.getElementById('ledBtn');
  const slider = document.getElementById('brightness');
  const state = btn.textContent === 'ON' ? 1 : 0;
  const brightness = parseInt(slider.value);

  // 尝试连接 MQTT WebSocket
  if (!mqttClient || !mqttClient.connected) {
    showToast('MQTT未连接, 正在尝试...');
    tryConnectMqttAndSend(state, brightness);
    return;
  }

  const msg = {
    id: Date.now().toString(),
    params: {
      led_switch:  { value: state },
      led_bright:  { value: brightness }
    }
  };
  const TOPIC_SET = `$sys/${PRODUCT_ID}/${DEVICE_NAME}/thing/property/set`;
  mqttClient.publish(TOPIC_SET, JSON.stringify(msg));
  showToast(`已发送: LED ${state?'开':'关'}, 亮度 ${brightness}%`);
}

function tryConnectMqttAndSend(state, brightness) {
  // 动态加载 MQTT.js
  const script = document.createElement('script');
  script.src = 'mqtt.min.js';
  script.onload = function() {
    const wsUrl = 'wss://mqtts.heclouds.com:8083/mqtt';
    mqttClient = mqtt.connect(wsUrl, {
      clientId: DEVICE_NAME,
      username: PRODUCT_ID,
      password: MQTT_TOKEN,
      keepalive: 120,
      reconnectPeriod: 5000
    });
    mqttClient.on('connect', function() {
      const msg = {
        id: Date.now().toString(),
        params: {
          led_switch:  { value: state },
          led_bright:  { value: brightness }
        }
      };
      const TOPIC_SET = `$sys/${PRODUCT_ID}/${DEVICE_NAME}/thing/property/set`;
      mqttClient.publish(TOPIC_SET, JSON.stringify(msg));
      showToast(`LED 指令已发送`);
      mqttClient.end();
      mqttClient = null;
    });
    mqttClient.on('error', function() {
      showToast('MQTT 连接失败, LED 控制暂不可用');
    });
    setTimeout(function() {
      if (mqttClient && !mqttClient.connected) {
        showToast('MQTT 连接超时, 请稍后重试');
        mqttClient.end();
        mqttClient = null;
      }
    }, 5000);
  };
  document.head.appendChild(script);
}

// ========== 告警弹窗 ==========
let toastTimer;
function showToast(text) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// ========== 历史曲线 ==========
const tempData = {
  labels: [],
  datasets: [
    { label: '温度 (°C)', data: [], borderColor: '#e8734a', backgroundColor: 'rgba(232,115,74,.1)', tension: 0.4, fill: true, yAxisID: 'y' },
    { label: '湿度 (%)',  data: [], borderColor: '#42a5f5', backgroundColor: 'rgba(66,165,245,.1)',  tension: 0.4, fill: true, yAxisID: 'y1' }
  ]
};

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: tempData,
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 16, font: { size: 11 } } } },
    scales: {
      x: { display: false },
      y: {
        type: 'linear', position: 'left', min: 0, max: 50,
        ticks: { font: { size: 10 }, callback: v => v + '°C' },
        grid: { color: '#f0f0f0' }
      },
      y1: {
        type: 'linear', position: 'right', min: 0, max: 100,
        ticks: { font: { size: 10 }, callback: v => v + '%' },
        grid: { drawOnChartArea: false }
      }
    }
  }
});

document.getElementById('brightness').addEventListener('input', function() {
  document.getElementById('bval').textContent = this.value + '%';
  updateLedUI(document.getElementById('ledBtn').textContent === 'ON', parseInt(this.value));
});

// ========== 启动轮询 ==========
window.addEventListener('DOMContentLoaded', () => {
  pollData();
});
</script>

</body>
</html>
